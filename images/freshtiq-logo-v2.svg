<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 60" width="270" height="60">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Icon: Rounded square with F mark -->
  <rect x="2" y="2" width="52" height="52" rx="13" fill="url(#g1)"/>
  <!-- F letterform -->
  <text x="12" y="40" font-size="32" fill="white" font-weight="900" font-family="Arial,Helvetica,sans-serif" letter-spacing="0">F</text>
  <!-- AI accent dot -->
  <circle cx="48" cy="10" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="44" cy="6" r="2.5" fill="#818cf8" opacity="0.4"/>
  <!-- Company name -->
  <text x="68" y="26" font-size="22" fill="#0f172a" font-weight="900" font-family="Arial,Helvetica,sans-serif" letter-spacing="0.3">Freshtiq</text>
  <text x="68" y="44" font-size="12" fill="#1d4ed8" font-weight="800" font-family="Arial,Helvetica,sans-serif" letter-spacing="1.2">AUTOMATION</text>
  <!-- Tagline -->
  <text x="68" y="55" font-size="8" fill="#94a3b8" font-weight="500" font-family="Arial,Helvetica,sans-serif" letter-spacing="0.8">AI · BOTS · ERP · CRM</text>
</svg>
