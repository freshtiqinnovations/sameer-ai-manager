<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 55" width="240" height="55">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background glow -->
  <rect x="3" y="3" width="48" height="48" rx="12" fill="url(#lg2)" opacity="0.08"/>
  <!-- Gradient rounded square icon -->
  <rect x="2" y="2" width="50" height="50" rx="12" fill="url(#lg)"/>
  <!-- Lightning bolt -->
  <polygon points="28,8 14,30 24,30 20,48 38,24 28,24 32,8" fill="white" opacity="0.95"/>
  <!-- Company name -->
  <text x="65" y="25" font-size="20" fill="#1a1a2e" font-weight="800" font-family="Arial,Helvetica,sans-serif" letter-spacing="0.5">Freshtiq</text>
  <text x="65" y="42" font-size="11" fill="#7c3aed" font-weight="700" font-family="Arial,Helvetica,sans-serif" letter-spacing="1">AUTOMATION</text>
</svg>
